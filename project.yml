# Bloom - project.yml (XcodeGen 配置)
# 喝水养植物 App：把"应该喝水"变成"它需要我喝水"

name: Bloom
options:
  bundleIdPrefix: com.pangtong
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "$(git rev-list --count HEAD)"
    SWIFT_STRICT_CONCURRENCY: "minimal"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: $(BLOOM_DEVELOPMENT_TEAM)
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    SWIFT_ENABLE_EXPLICIT_MODULES: NO
    ENABLE_DEBUG_DYLIB: NO
    DEBUG_DYLIB_INSTALL_NAME: ""
    ENABLE_PREVIEWS: NO
    OTHER_SWIFT_FLAGS: "-D RELEASE_BUILD"

targets:
  Bloom:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: LaunchScreen.storyboard
      - path: Resources
      - path: App
      - path: Core
      - path: Features
      - path: UI
      - path: Assets.xcassets
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.pangtong.bloom
      CODE_SIGN_ENTITLEMENTS: Bloom.entitlements
      INFOPLIST_FILE: Info.plist
      GENERATE_INFOPLIST_FILE: NO
    capabilities:
      iCloud:
        properties:
          containers:
            - identifier: iCloud.com.pangtong.bloom
              name: Bloom CloudKit Container
              service: CloudKit

  BloomWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Widget
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.pangtong.bloom.widget
      CODE_SIGN_ENTITLEMENTS: Widget/BloomWidget.entitlements
      INFOPLIST_FILE: Widget/Info.plist
      GENERATE_INFOPLIST_FILE: NO

  BloomTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Tests
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.pangtong.bloom.tests
    dependencies:
      - target: Bloom
