# WaterMinder-Pro/project.yml
# XcodeGen 配置文件

name: WaterMinder
options:
  bundleIdPrefix: com.pangtong
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.0"
  
targets:
  WaterMinder:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: WaterMinderApp.swift
      - path: Info.plist
      - path: Models
      - path: Stores
      - path: Managers
      - path: Views
      - path: Utilities
      - path: Assets.xcassets
    settings:
      INFOPLIST_FILE: Info.plist
      PRODUCT_BUNDLE_IDENTIFIER: com.pangtong.waterminder
      SWIFT_VERSION: "5.0"
      MARKETING_VERSION: "1.0.0"
      CURRENT_PROJECT_VERSION: "2"
      SWIFT_STRICT_CONCURRENCY: "minimal"
      CODE_SIGN_STYLE: Automatic
      CODE_SIGN_ENTITLEMENTS: WaterMinder.entitlements
    preBuildScripts:
      - name: "Update Widget Data"
        script: |
          # Widget data will be updated by the app at runtime
          echo "Widget pre-build step"
    dependencies:
      - target: WaterMinderWidget
          
  WaterMinderWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: WaterMinderWidget
    settings:
      INFOPLIST_FILE: WaterMinderWidget/Info.plist
      PRODUCT_BUNDLE_IDENTIFIER: com.pangtong.waterminder.widget
      SWIFT_VERSION: "5.0"
      MARKETING_VERSION: "1.0.0"
      CURRENT_PROJECT_VERSION: "2"
      CODE_SIGN_STYLE: Automatic
      CODE_SIGN_ENTITLEMENTS: WaterMinderWidget.entitlements
      SWIFT_STRICT_CONCURRENCY: "minimal"
      
  WaterMinderTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: Tests
    settings:
      INFOPLIST_FILE: Tests/Info.plist
      PRODUCT_BUNDLE_IDENTIFIER: com.pangtong.waterminder.tests
      SWIFT_VERSION: "5.0"
    dependencies:
      - target: WaterMinder
